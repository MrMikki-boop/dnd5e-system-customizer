name: Build Foundry Module

on:
  push:
    branches:
      - master
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        run: node --check index.js

      - name: Validate JSON manifests
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const readJson = file => JSON.parse(fs.readFileSync(file, "utf8"));
          const manifest = readJson("module.json");
          const required = ["id", "title", "version", "esmodules", "styles", "manifest", "download"];

          for (const key of required) {
            if (manifest[key] === undefined || manifest[key] === "") {
              throw new Error(`module.json is missing required field: ${key}`);
            }
          }

          if (!Array.isArray(manifest.esmodules) || !manifest.esmodules.includes("index.js")) {
            throw new Error("module.json must include index.js in esmodules");
          }

          for (const language of manifest.languages ?? []) {
            if (!language.path) throw new Error(`Language entry ${language.lang ?? "<unknown>"} has no path`);
            readJson(language.path);
          }

          for (const file of fs.readdirSync("languages").filter(f => f.endsWith(".json"))) {
            readJson(path.join("languages", file));
          }
          NODE

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          mkdir -p dist
          zip -r "dist/dnd5e-system-customizer.zip" \
            module.json \
            index.js \
            esm \
            languages \
            styles \
            templates
          cp module.json dist/module.json

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnd5e-system-customizer
          path: |
            dist/module.json
            dist/dnd5e-system-customizer.zip

  release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: dnd5e-system-customizer
          path: dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/module.json
            dist/dnd5e-system-customizer.zip
